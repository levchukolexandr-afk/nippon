<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій міні-ап</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            text-align: center; 
            background: #f5f5f5;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Привіт! 👋</h1>
    <p>Це мій міні-ап</p>
    <button onclick="sendData()">Надіслати дані боту</button>

    <!-- Підключаємо Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Ініціалізація
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран
        tg.ready();  // Повідомити Telegram, що ап готовий

        function sendData() {
            tg.sendData("Привіт від міні-апа!");
        }
    </script>
</body>
</html>
